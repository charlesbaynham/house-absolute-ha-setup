---
# Rain Warning Package
#
# When the master bedroom lamp is turned on for the first time after 5am,
# it flashes a colour indicating the day's weather forecast:
#   blue  = rain expected
#   red   = no rain, but temperature forecast > 25°C
#   green = no rain and temperature forecast ≤ 25°C
# Subsequent turn-ons that day are normal.
#
# Dependencies:
# - weather.forecast_home (Met.no integration from default_config)
# - light.master_bedroom_lamp
#
# Features:
# - Detects first lamp turn-on after 5am each day
# - Checks weather forecast for rain/precipitation and temperature
# - Flashes the appropriate colour for 10 seconds
# - Resets at midnight for next day

input_boolean:
  rain_warning_shown_today:
    name: Rain Warning Shown Today
    icon: mdi:weather-rainy
    initial: false

template:
  - binary_sensor:
      - name: "Rain Expected Today"
        unique_id: rain_expected_today
        state: >
          {% set weather_entity = 'weather.forecast_home' %}
          {% if states(weather_entity) != 'unavailable' and states(weather_entity) != 'unknown' %}
            {% set current_condition = states(weather_entity) %}
            {% set forecast = state_attr(weather_entity, 'forecast') %}
            {% set rain_conditions = ['rainy', 'pouring', 'snowy-rainy', 'lightning-rainy'] %}
            
            {# Check current condition #}
            {% set current_rain = current_condition in rain_conditions %}
            
            {# Check forecast for today only (first forecast period) #}
            {% set forecast_rain = false %}
            {% if forecast and forecast|length > 0 %}
              {% if forecast[0].condition in rain_conditions %}
                {% set forecast_rain = true %}
              {% endif %}
            {% endif %}
            
            {{ current_rain or forecast_rain }}
          {% else %}
            false
          {% endif %}
        device_class: moisture
        icon: >
          {% if this.state == 'on' %}
            mdi:weather-rainy
          {% else %}
            mdi:weather-sunny
          {% endif %}

automation:
  - id: '1739240000000'
    alias: Master bedroom rain warning on first light
    description: >-
      Flash master bedroom lamp on first turn-on after 5am to indicate the
      day's forecast: blue = rain, red = no rain but hot (>25°C), green = otherwise.
    triggers:
    - trigger: state
      entity_id: light.master_bedroom_lamp
      to: 'on'
    conditions:
    - condition: time
      after: '05:00:00'
    - condition: state
      entity_id: input_boolean.rain_warning_shown_today
      state: 'off'
    actions:
    # Mark warning as shown for today
    - action: input_boolean.turn_on
      metadata: {}
      data: {}
      target:
        entity_id: input_boolean.rain_warning_shown_today
    # Flash colour based on forecast
    - choose:
      - conditions:
        - condition: state
          entity_id: binary_sensor.rain_expected_today
          state: 'on'
        sequence:
        # Blue = rain expected
        - action: light.turn_on
          metadata: {}
          data:
            rgb_color: [0, 0, 255]
            brightness: 255
          target:
            entity_id: light.master_bedroom_lamp
      - conditions:
        - condition: template
          value_template: >
            {% set forecast = state_attr('weather.forecast_home', 'forecast') %}
            {% if forecast and forecast | length > 0 %}
              {{ forecast[0].temperature | float(0) > 25 }}
            {% else %}
              {{ state_attr('weather.forecast_home', 'temperature') | float(0) > 25 }}
            {% endif %}
        sequence:
        # Red = no rain, temperature > 25°C
        - action: light.turn_on
          metadata: {}
          data:
            rgb_color: [255, 0, 0]
            brightness: 255
          target:
            entity_id: light.master_bedroom_lamp
      default:
      # Green = no rain, temperature ≤ 25°C
      - action: light.turn_on
        metadata: {}
        data:
          rgb_color: [0, 255, 0]
          brightness: 255
        target:
          entity_id: light.master_bedroom_lamp
    # Wait 10 seconds to show the colour
    - delay:
        seconds: 10
    # Return to normal operation (user can adjust after)
    - action: light.turn_on
      metadata: {}
      data:
        brightness: 128
        color_temp: 370
      target:
        entity_id: light.master_bedroom_lamp
    mode: single

  - id: '1739240000001'
    alias: Reset rain warning flag at midnight
    description: Reset the rain warning shown flag at midnight each day
    triggers:
    - trigger: time
      at: '00:00:00'
    conditions: []
    actions:
    - action: input_boolean.turn_off
      metadata: {}
      data: {}
      target:
        entity_id: input_boolean.rain_warning_shown_today
    mode: single
